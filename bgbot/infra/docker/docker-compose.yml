version: "3.9"
services:
  postgres:
    image: postgres:16-alpine
    container_name: bgbot-db
    restart: always
    environment:
      POSTGRES_DB: bgbot
      POSTGRES_USER: bgbot
      POSTGRES_PASSWORD: ${DB_PASSWORD:-bgbot_secret}
    ports: ["127.0.0.1:5432:5432"]
    volumes: [pgdata:/var/lib/postgresql/data]
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U bgbot"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    networks: [bgbot-net]

  redis:
    image: redis:7-alpine
    container_name: bgbot-redis
    restart: always
    ports: ["127.0.0.1:6379:6379"]
    volumes: [redisdata:/data]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks: [bgbot-net]

  backend:
    build: {context: ../.., dockerfile: infra/docker/Dockerfile.backend}
    container_name: bgbot-api
    restart: always
    ports: ["127.0.0.1:8000:8000"]
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://bgbot:${DB_PASSWORD:-bgbot_secret}@postgres:5432/bgbt
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes: [../../logs:/app/logs]
    networks: [bgbot-net]

  worker:
    build: {context: ../.., dockerfile: infra/docker/Dockerfile.worker}
    container_name: bgbot-worker
    restart: always
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://bgbot:${DB_PASSWORD:-bgbot_secret}@postgres:5432/bgbt
      REDIS_URL: redis://redis:6379/0
    depends_on:
      postgres: {condition: service_healthy}
      redis: {condition: service_healthy}
    volumes: [../../logs:/app/logs]
    networks: [bgbot-net]

  event-consumer:
    build: {context: ../.., dockerfile: infra/docker/Dockerfile.worker}
    container_name: bgbot-events
    restart: always
    env_file: ../.env
    environment:
      DATABASE_URL: postgresql://bgbot:${DB_PASSWORD:-bgbot_secret}@postgres:5432/bgbt
      REDIS_URL: redis://redis:6379/0
    depends_on:
      redis: {condition: service_healthy}
    command: ["python", "-m", "worker.app.consumers.event_consumer"]
    networks: [bgbot-net]

  frontend:
    build: {context: ../.., dockerfile: infra/docker/Dockerfile.frontend}
    container_name: bgbot-web
    restart: always
    ports: ["127.0.0.1:3000:3000"]
    depends_on: [backend]
    networks: [bgbot-net]

  nginx:
    image: nginx:1.25-alpine
    container_name: bgbot-nginx
    restart: always
    ports: ["80:80", "443:443"]
    volumes: [../nginx/nginx.conf:/etc/nginx/nginx.conf:ro]
    depends_on: [frontend, backend]
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks: [bgbot-net]

networks:
  bgbot-net:
    driver: bridge

volumes:
  pgdata:
  redisdata:
