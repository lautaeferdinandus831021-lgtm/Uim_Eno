<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>BG-BOT v5</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0a;--s:#141414;--s2:#1c1c1c;--b:#2a2a2a;--a:#00d4aa;--r:#ff4757;--t1:#f0ece4;--t2:#a09a90;--t3:#5a5550}
body{font-family:monospace;background:var(--bg);color:var(--t1);min-height:100vh;font-size:13px}
a{color:var(--a);text-decoration:none}
.wrap{max-width:800px;margin:0 auto;padding:12px}
.row{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.col{flex:1;min-width:140px;background:var(--s);border:1px solid var(--b);border-radius:8px;padding:12px}
.col h4{font-size:10px;color:var(--t3);text-transform:uppercase;margin-bottom:6px}
.col .v{font-size:20px;font-weight:bold}
.g{color:var(--a)}.r{color:var(--r)}
.btn{padding:8px 16px;border:1px solid var(--b);border-radius:6px;background:var(--s);color:var(--t1);cursor:pointer;font-family:inherit;font-size:12px}
.btn:hover{border-color:var(--a);color:var(--a)}
.btn-a{background:var(--a);color:#000;border-color:var(--a)}
.btn-a:hover{background:#00eabb}
.btn-r{border-color:var(--r);color:var(--r)}
.btn-r:hover{background:var(--r);color:#fff}
input,select{width:100%;padding:8px;background:var(--s2);border:1px solid var(--b);border-radius:6px;color:var(--t1);font-family:inherit;font-size:12px;margin-bottom:8px}
label{display:block;font-size:10px;color:var(--t3);margin-bottom:4px}
.card{background:var(--s);border:1px solid var(--b);border-radius:8px;padding:12px;margin-bottom:12px}
.card h3{font-size:11px;color:var(--t3);text-transform:uppercase;margin-bottom:8px}
table{width:100%;border-collapse:collapse;font-size:11px}
th{text-align:left;padding:6px;color:var(--t3);border-bottom:1px solid var(--b)}
td{padding:6px;border-bottom:1px solid rgba(42,42,42,.5);color:var(--t2)}
.badge{display:inline-block;padding:2px 6px;border-radius:4px;font-size:10px}
.badge-a{background:rgba(0,212,170,.1);color:var(--a)}
.badge-r{background:rgba(255,71,87,.1);color:var(--r)}
.badge-n{background:rgba(160,154,144,.1);color:var(--t2)}
.dot{display:inline-block;width:8px;height:8px;border-radius:50%;margin-right:6px}
.dot-on{background:var(--a);box-shadow:0 0 6px var(--a)}
.dot-off{background:var(--t3)}
nav{display:flex;gap:4px;margin-bottom:12px;overflow-x:auto;padding:8px 0;position:sticky;top:0;background:var(--bg);z-index:10}
nav a{padding:6px 12px;border-radius:6px;font-size:11px;color:var(--t3);white-space:nowrap}
nav a.on{color:var(--t1);background:var(--s2)}
.err{background:rgba(255,71,87,.1);border:1px solid rgba(255,71,87,.3);color:var(--r);padding:8px;border-radius:6px;margin-bottom:8px;display:none}
#logs{max-height:200px;overflow-y:auto;font-size:11px;line-height:1.8;color:var(--t3)}
.auth{display:flex;align-items:center;justify-content:center;min-height:100vh;padding:20px}
.auth-box{width:100%;max-width:320px}
.auth-box h1{font-size:28px;text-align:center;margin-bottom:4px}
.auth-box h1 span{color:var(--a)}
.auth-box p{color:var(--t3);font-size:11px;text-align:center;margin-bottom:24px}
</style>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
// === AUTH INIT (Bindings) ===
document.addEventListener("DOMContentLoaded", function() {
  if (document.getElementById('btnLogin')) {
    document.getElementById('btnLogin').onclick = function() {
      document.getElementById('authErr').style.display = 'none';
      var email = document.getElementById('lEmail').value;
      var pass = document.getElementById('lPass').value;

      api('POST', '/auth/login', {email: email, password: pass})
        .then(function(d) {
          T = d.access_token;
          U = d.user;
          localStorage.setItem('bgbot_token', T);
          localStorage.setItem('bgbot_user', JSON.stringify(U || {}));
          showDash();
        })
        .catch(function(e) {
          var el = document.getElementById('authErr');
          el.textContent = e.message;
          el.style.display = 'block';
        });
    };
  }

  if (document.getElementById('btnReg')) {
    document.getElementById('btnReg').onclick = function() {
      var p = document.getElementById('rPass').value;
      var name = document.getElementById('rName').value;
      var email = document.getElementById('rEmail').value;

      api('POST', '/auth/register', {name: name, email: email, password: p, confirm: p})
        .then(function() {
          showLogin();
          var el = document.getElementById('authErr');
          el.textContent = 'Created! Sign in.';
          el.style.display = 'block';
          el.style.background = 'rgba(0,212,170,.1)';
          el.style.borderColor = 'rgba(0,212,170,.3)';
          el.style.color = 'var(--a)';
        })
        .catch(function(e) {
          var el = document.getElementById('authErr');
          el.textContent = e.message;
          el.style.display = 'block';
        });
    };
  }

  if (document.getElementById('linkReg')) {
    document.getElementById('linkReg').onclick = function(e) {
      e.preventDefault();
      document.getElementById('loginF').style.display = 'none';
      document.getElementById('regF').style.display = 'block';
      document.getElementById('authErr').style.display = 'none';
    };
  }

  if (document.getElementById('linkLogin')) {
    document.getElementById('linkLogin').onclick = function(e) {
      e.preventDefault();
      showLogin();
    };
  }

  // NAV click handlers
  function initNav() {
    var navLinks = document.querySelectorAll('#nav a');
    navLinks.forEach(function(a){
      a.onclick = function(e){
        e.preventDefault();
        var tab = this.getAttribute('data-tab');
        if(tab==='logout'){logout();return;}
        navLinks.forEach(function(x){x.classList.remove('on');});
        this.classList.add('on');
        renderTab(tab);
      };
    });
  }
  initNav();

  // Also re-init nav after showDash
  var _origShowDash = window.showDash || showDash;
  if(typeof showDash === 'function'){
    var _sd = showDash;
    showDash = function(){
      _sd();
      setTimeout(initNav, 100);
    };
  }

  // Check existing token
  if (T) {
    api('GET', '/auth/me').then(function(d) {
      if (d && d.email) {
        U = d;
        showDash();
      }
    }).catch(function() {
      T = null;
      localStorage.removeItem('bgbot_token');
    });
  }
});
</script>

<script src="https://unpkg.com/lightweight-charts@4.1.0/dist/lightweight-charts.standalone.production.js"></script>
<script src="https://cdn.jsdelivr.net/npm/technicalindicators@3.1.0/dist/technicalindicators.min.js"></script>
</head>
<body>

<!-- AUTH -->
<div id="authPage" class="auth">
<div class="auth-box">
<h1>BG-BOT <span>v5</span></h1>
<p>Sign in to your account</p>
<div id="authErr" class="err"></div>
<div id="loginF">
<label>Email</label><input id="lEmail" value="test@test.com">
<label>Password</label><input id="lPass" type="password" value="mypassword123">
<button class="btn btn-a" style="width:100%" id="btnLogin">Sign In</button>
<p style="text-align:center;margin-top:12px"><a href="#" id="linkReg">Create account</a></p>
</div>
<div id="regF" style="display:none">
<label>Name</label><input id="rName" value="Test">
<label>Email</label><input id="rEmail" value="test@test.com">
<label>Password</label><input id="rPass" type="password" value="mypassword123">
<button class="btn btn-a" style="width:100%" id="btnReg">Create Account</button>
<p style="text-align:center;margin-top:12px"><a href="#" id="linkLogin">Back to login</a></p>
</div>
</div>
</div>

<!-- DASHBOARD -->
<div id="dashPage" style="display:none" class="wrap">
<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
<div style="font-size:16px;font-weight:bold">BG-BOT <span class="g">v5</span></div>
<div><span class="dot dot-on"></span><span style="font-size:11px;color:var(--t3)">Connected</span></div>
</div>
<nav id="nav">
<a href="#" class="on" data-tab="overview">Overview</a>
<a href="#" data-tab="trades">Trades</a>
<a href="#" data-tab="bot">Bot</a>
<a href="#" data-tab="backtest">Backtest</a>
<a href="#" data-tab="spot">Spot</a>
<a href="#" data-tab="perpetual">Perpetual</a>
<a href="#" data-tab="market">Market</a>
<a href="#" data-tab="config">Config</a>
<a href="#" data-tab="logout" style="color:var(--r)">Logout</a>
</nav>
<div id="content"></div>
</div>

<script>
// === AUTH ===
var T=localStorage.getItem('bgbot_token');
var U=null;
try{var _su=localStorage.getItem('bgbot_user');if(_su)U=JSON.parse(_su);}catch(e){}

function api(m,p,b){
  var h={'Content-Type':'application/json'};
  if(T)h['Authorization']='Bearer '+T;
  var o={method:m,headers:h};
  if(b)o.body=JSON.stringify(b);
  return fetch(p,o).then(function(r){
    if(!r.ok){
      return r.json().catch(function(){return {};}).then(function(d){
        if(r.status===401){logout();}
        throw new Error(d.detail||d.msg||('Error '+r.status));
      });
    }
    return r.json();
  });
}

function showDash(){
  document.getElementById('authPage').style.display='none';
  document.getElementById('dashPage').style.display='block';
  renderTab('overview');
}

function showLogin(){document.getElementById('loginF').style.display='block';document.getElementById('regF').style.display='none';document.getElementById('authErr').style.display='none';}

function logout(){T=null;U=null;U={name:'Trader',email:'local'};showDash();document.getElementById('authPage').style.display='flex';document.getElementById('dashPage').style.display='none';}
</script>
<script>
// === NAV ===
function renderTab(tab){
  var c=document.getElementById('content');
  c.innerHTML='<div style="color:var(--t3);padding:20px">Loading...</div>';
  if(tab==='overview')renderOverview(c);
  else if(tab==='trades')renderTrades(c);
  else if(tab==='bot')renderBot(c);
  else if(tab==='backtest')renderBacktest(c);
  else if(tab==='config')renderConfig(c);
  else if(tab==='market')renderMarket(c);
  else if(tab==='spot')renderSpot(c);
  else if(tab==='perpetual')renderPerpetual(c);
}

function renderOverview(c){
  Promise.all([
    api('GET','/api/trades/stats').catch(function(){return{};}),
    api('GET','/api/bot/status').catch(function(){return{running:false,m1:{},m5:{},current_price:0,mode:'spot',balance_type:'demo',aligned:false,trade_signal:'NEUTRAL',position:null,logs:[]};}),
    api('GET','/api/trades?limit=5').catch(function(){return[];})
  ]).then(function(r){
    var s=r[0],b=r[1],t=r[2];
    var price=b.current_price||0;
    var mode=(b.mode||'spot').toUpperCase();
    var balType=(b.balance_type||'demo').toUpperCase();
    var m1=b.m1||{};
    var m5=b.m5||{};
    var aligned=b.aligned||false;
    var tradeSig=b.trade_signal||'NEUTRAL';
    var m1sig=m1.signal||'-';
    var m5sig=m5.signal||'-';
    var m1bs=m1.buy_sell||'WAIT';
    var m5bs=m5.buy_sell||'WAIT';
    var m1hist=m1.histogram||0;
    var m5hist=m5.histogram||0;
    var m1macd=m1.macd||0;
    var m5macd=m5.macd||0;
    var m1mom=m1.momentum||'N/A';
    var m5mom=m5.momentum||'N/A';
    var m1vol=m1.volatility||0;
    var m5vol=m5.volatility||0;
    var dir=b.position?b.position.side:'NONE';

    // Sync logic: derive aligned + trade_signal from actual M1/M5 data
    var actualAligned=false;
    var actualSignal='NEUTRAL';
    if(m1macd>0&&m5macd>0){actualAligned=true;actualSignal='LONG';}
    else if(m1macd<0&&m5macd<0){actualAligned=true;actualSignal='SHORT';}

    var m1cls=m1sig==='LONG'?'g':(m1sig==='SHORT'?'r':'');
    var m5cls=m5sig==='LONG'?'g':(m5sig==='SHORT'?'r':'');
    var m1bsCls=m1bs==='BUY'||m1bs==='HOLD_LONG'?'g':(m1bs==='SELL'||m1bs==='HOLD_SHORT'?'r':'');
    var m5bsCls=m5bs==='BUY'||m5bs==='HOLD_LONG'?'g':(m5bs==='SELL'||m5bs==='HOLD_SHORT'?'r':'');
    var alignCls=actualAligned?'g':'r';
    var sigCls=actualSignal==='LONG'?'g':(actualSignal==='SHORT'?'r':'');
    var dirCls=dir==='LONG'?'g':(dir==='SHORT'?'r':'');
    var modeCls=mode==='PERPETUAL'?'#ff6b6b':'var(--a)';
    var balCls=balType==='REAL'?'#ff6b6b':'var(--a)';
    var m1momCls=m1mom==='GROWING'?'g':(m1mom==='FADING'?'r':'');
    var m5momCls=m5mom==='GROWING'?'g':(m5mom==='FADING'?'r':'');

    // Recent logs
    var logsHtml='';
    if(b.logs&&b.logs.length>0){
      logsHtml=b.logs.slice(-5).reverse().map(function(l){
        var cls=l.pnl>0?'g':(l.pnl<0?'r':'');
        return '<div style="font-size:11px;padding:2px 0;border-bottom:1px solid var(--b1)"><span style="color:var(--t3)">'+l.time+'</span> <span class="'+cls+'">'+l.msg+'</span></div>';
      }).join('');
    }else{logsHtml='<div style="color:var(--t3);font-size:11px">No logs</div>';}

    c.innerHTML=
    '<div style="margin-bottom:12px"><b>Welcome</b>, '+(U?U.name:'User')+'</div>'+

    // Row 1: Price + Mode + Balance + Signal
    '<div class="row">'+
      '<div class="col"><h4>BTC Price</h4><div class="v">$'+(price?price.toLocaleString(undefined,{minimumFractionDigits:2}):'--')+'</div></div>'+
      '<div class="col"><h4>Mode</h4><div class="v" style="color:'+modeCls+'">'+mode+'</div></div>'+
      '<div class="col"><h4>Balance</h4><div class="v" style="color:'+balCls+'">'+balType+'</div></div>'+
      '<div class="col"><h4>Trade Signal</h4><div class="v '+sigCls+'">'+actualSignal+'</div></div>'+
    '</div>'+

    // Row 2: Account stats
    '<div class="row">'+
      '<div class="col"><h4>Account</h4><div class="v g">$'+(b.balance||10000).toFixed(2)+'</div></div>'+
      '<div class="col"><h4>Trades</h4><div class="v">'+(s.total||0)+'</div><div style="font-size:10px;color:var(--t3)">'+(s.wins||0)+'W / '+(s.losses||0)+'L</div></div>'+
      '<div class="col"><h4>Win Rate</h4><div class="v">'+(s.win_rate||0)+'%</div></div>'+
      '<div class="col"><h4>PnL</h4><div class="v '+(s.total_pnl>=0?'g':'r')+'">$'+(s.total_pnl||0).toFixed(2)+'</div></div>'+
    '</div>'+

    // Bot Status Card
    '<div class="card"><h3>Bot Status <span style="font-size:11px;color:'+(b.running?'var(--g)':'var(--r)')+'">● '+(b.running?'Running':'Stopped')+'</span></h3>'+
      '<div class="row">'+
        '<div class="col"><h4>Position</h4><div class="v '+dirCls+'">'+dir+'</div></div>'+
        '<div class="col"><h4>Alignment</h4><div class="v '+alignCls+'">'+(actualAligned?'ALIGNED':'NOT ALIGNED')+'</div></div>'+
        '<div class="col"><h4>Signal</h4><div class="v '+sigCls+'">'+actualSignal+'</div></div>'+
        '<div class="col"><h4>Bot</h4><div><span class="dot '+(b.running?'dot-on':'dot-off')+'"></span>'+(b.running?'Active':'Off')+'</div></div>'+
      '</div>'+
    '</div>'+

    // MACD Overview Card (same data as Bot tab)
    '<div class="card"><h3>MACD Overview <span style="font-size:10px;color:var(--t3)">4-5-3 Streaming</span></h3>'+
      '<div style="display:flex;gap:8px;flex-wrap:wrap">'+
        // M1 Box
        '<div style="flex:1;min-width:250px;border-left:3px solid var(--a);padding:12px;background:var(--s);border-radius:8px">'+
          '<div style="font-size:14px;font-weight:bold;color:var(--a);margin-bottom:8px">MACD M1</div>'+
          '<div style="display:flex;gap:8px;margin-bottom:6px">'+
            '<div style="flex:1;background:var(--s2);border-radius:6px;padding:8px;text-align:center"><div style="font-size:9px;color:var(--t3)">SIGNAL</div><div class="'+m1cls+'" style="font-size:18px;font-weight:bold">'+m1sig+'</div></div>'+
            '<div style="flex:1;background:var(--s2);border-radius:6px;padding:8px;text-align:center"><div style="font-size:9px;color:var(--t3)">BUY/SELL</div><div class="'+m1bsCls+'" style="font-size:18px;font-weight:bold">'+m1bs+'</div></div>'+
            '<div style="flex:1;background:var(--s2);border-radius:6px;padding:8px;text-align:center"><div style="font-size:9px;color:var(--t3)">MOMENTUM</div><div class="'+m1momCls+'" style="font-size:14px;font-weight:bold">'+m1mom+'</div></div>'+
          '</div>'+
          '<div style="display:flex;gap:8px">'+
            '<div style="flex:1;background:var(--s2);border-radius:4px;padding:4px"><div style="font-size:8px;color:var(--t3)">MACD</div><div style="font-size:11px">'+m1macd.toFixed(6)+'</div></div>'+
            '<div style="flex:1;background:var(--s2);border-radius:4px;padding:4px"><div style="font-size:8px;color:var(--t3)">HIST</div><div class="'+(m1hist>=0?'g':'r')+'" style="font-size:11px">'+m1hist.toFixed(6)+'</div></div>'+
            '<div style="flex:1;background:var(--s2);border-radius:4px;padding:4px"><div style="font-size:8px;color:var(--t3)">VOL</div><div style="font-size:11px">'+m1vol.toFixed(2)+'</div></div>'+
          '</div>'+
        '</div>'+
        // M5 Box
        '<div style="flex:1;min-width:250px;border-left:3px solid #ff6b6b;padding:12px;background:var(--s);border-radius:8px">'+
          '<div style="font-size:14px;font-weight:bold;color:#ff6b6b;margin-bottom:8px">MACD M5</div>'+
          '<div style="display:flex;gap:8px;margin-bottom:6px">'+
            '<div style="flex:1;background:var(--s2);border-radius:6px;padding:8px;text-align:center"><div style="font-size:9px;color:var(--t3)">SIGNAL</div><div class="'+m5cls+'" style="font-size:18px;font-weight:bold">'+m5sig+'</div></div>'+
            '<div style="flex:1;background:var(--s2);border-radius:6px;padding:8px;text-align:center"><div style="font-size:9px;color:var(--t3)">BUY/SELL</div><div class="'+m5bsCls+'" style="font-size:18px;font-weight:bold">'+m5bs+'</div></div>'+
            '<div style="flex:1;background:var(--s2);border-radius:6px;padding:8px;text-align:center"><div style="font-size:9px;color:var(--t3)">MOMENTUM</div><div class="'+m5momCls+'" style="font-size:14px;font-weight:bold">'+m5mom+'</div></div>'+
          '</div>'+
          '<div style="display:flex;gap:8px">'+
            '<div style="flex:1;background:var(--s2);border-radius:4px;padding:4px"><div style="font-size:8px;color:var(--t3)">MACD</div><div style="font-size:11px">'+m5macd.toFixed(6)+'</div></div>'+
            '<div style="flex:1;background:var(--s2);border-radius:4px;padding:4px"><div style="font-size:8px;color:var(--t3)">HIST</div><div class="'+(m5hist>=0?'g':'r')+'" style="font-size:11px">'+m5hist.toFixed(6)+'</div></div>'+
            '<div style="flex:1;background:var(--s2);border-radius:4px;padding:4px"><div style="font-size:8px;color:var(--t3)">VOL</div><div style="font-size:11px">'+m5vol.toFixed(2)+'</div></div>'+
          '</div>'+
        '</div>'+
      '</div>'+
    '</div>'+

    // Open Position Card
    (b.position?(
    '<div class="card"><h3>Open Position</h3>'+
      '<div class="row">'+
        '<div class="col"><h4>Side</h4><div class="v '+dirCls+'">'+b.position.side+'</div></div>'+
        '<div class="col"><h4>Entry</h4><div class="v">$'+b.position.entry.toLocaleString(undefined,{minimumFractionDigits:2})+'</div></div>'+
        '<div class="col"><h4>Current</h4><div class="v">$'+price.toLocaleString(undefined,{minimumFractionDigits:2})+'</div></div>'+
        '<div class="col"><h4>TP</h4><div class="v g">$'+b.position.tp.toLocaleString(undefined,{minimumFractionDigits:2})+'</div></div>'+
        '<div class="col"><h4>SL</h4><div class="v r">$'+b.position.sl.toLocaleString(undefined,{minimumFractionDigits:2})+'</div></div>'+
        '<div class="col"><h4>PnL</h4><div class="v '+(b.position.unrealized_pnl>=0?'g':'r')+'">$'+b.position.unrealized_pnl.toFixed(2)+'</div></div>'+
      '</div></div>'):'')+

    // Bot Logs
    '<div class="card"><h3>Recent Bot Logs</h3><div style="max-height:200px;overflow-y:auto;font-family:monospace">'+logsHtml+'</div></div>'+

    // Recent Trades
    '<div class="card"><h3>Recent Trades</h3>'+
      (t.length===0?'<div style="color:var(--t3);font-size:11px;text-align:center;padding:12px">No trades yet</div>':
      '<table class="table">'+t.slice(0,5).map(function(x){return '<tr><td>'+x.side.toUpperCase()+'</td><td>'+x.pair+'</td><td class="'+(x.pnl>=0?'g':'r')+'">$'+x.pnl.toFixed(2)+'</td><td style="color:var(--t3)">'+x.status+'</td></tr>';}).join('')+'</table>')+
    '</div>';

  }).catch(function(e){c.innerHTML='<div class="card" style="color:var(--r)">Error: '+e.message+'</div>';});
}

function renderTrades(c){
  api('GET','/api/trades?limit=100').catch(function(){return[];}).then(function(t){
    c.innerHTML='<div class="card"><h3>Trades ('+t.length+')</h3>'+
    '<div style="margin-bottom:8px"><button class="btn" id="btnExportTrades">Export CSV</button> <button class="btn" id="btnRefreshTrades">Refresh</button></div>'+
    (t.length===0?'<div style="color:var(--t3);text-align:center;padding:20px">No trades yet</div>':
    '<table><tr><th>#</th><th>Time</th><th>Mode</th><th>Side</th><th>Pair</th><th>Price</th><th>PnL</th></tr>'+
    t.map(function(x,i){return '<tr><td>'+(i+1)+'</td><td>'+(x.trade_time||'').slice(0,16)+'</td><td><span class="badge badge-n">'+x.mode+'</span></td><td><span class="badge '+(x.side==='buy'?'badge-a':'badge-r')+'">'+x.side.toUpperCase()+'</span></td><td>'+x.pair+'</td><td>$'+x.price.toLocaleString()+'</td><td class="'+(x.pnl>=0?'g':'r')+'">$'+x.pnl.toFixed(2)+'</td></tr>';}).join('')+
    '</table>')+'</div>';
    var btnExp = document.getElementById('btnExportTrades');
    if (btnExp) btnExp.onclick = function() { window.open('/api/trades/export', '_blank'); };
    var btnRef = document.getElementById('btnRefreshTrades');
    if (btnRef) btnRef.onclick = function() { renderTrades(document.getElementById('content')); };
  });
}

function _smoothPriceUpdate(){
  // Update BB title with active TF
  var tf1=document.getElementById('mktTabM1');var isM1=tf1&&tf1.className.indexOf('btn-start')>=0;var tfLabel=isM1?'M1':'M5';var bbTitle=document.getElementById('mktBBTitle');if(bbTitle)bbTitle.textContent='BB '+tfLabel+' Support (Lower)';
  var canvas=document.getElementById('candleCanvas');
  if(!canvas||!window._mktLivePrice)return;
  // Only update price display elements, not the chart
  var pe=document.getElementById('mktLivePrice');
  if(pe)pe.textContent='$'+window._mktLivePrice.toLocaleString(undefined,{minimumFractionDigits:2,maximumFractionDigits:2});
  // Update BB cards with live WS data
  if(window._mktLiveBB){
    var bb=window._mktLiveBB;
    var bbL=document.getElementById('mktBBLow');if(bbL&&bb.bb_lower>0)bbL.textContent='$'+bb.bb_lower.toLocaleString(undefined,{minimumFractionDigits:2});
    var bbM=document.getElementById('mktBBMid');if(bbM&&bb.bb_mid>0)bbM.textContent='$'+bb.bb_mid.toLocaleString(undefined,{minimumFractionDigits:2});
    var bbH=document.getElementById('mktBBHigh');if(bbH&&bb.bb_upper>0)bbH.textContent='$'+bb.bb_upper.toLocaleString(undefined,{minimumFractionDigits:2});
    var bbPU=document.getElementById('mktBBPctUp');if(bbPU){
      var pctU=bb.bb_pct_from_support||0;
      bbPU.textContent=pctU.toFixed(2)+'% from support';
      bbPU.style.color=pctU<20?'#00d4aa':pctU<50?'#e8c547':'#ff4757';
    }
    var bbPD=document.getElementById('mktBBPctDown');if(bbPD){
      var pctD=bb.bb_pct_from_peak||0;
      bbPD.textContent=pctD.toFixed(2)+'% to peak';
      bbPD.style.color=pctD<20?'#ff4757':pctD<50?'#e8c547':'#00d4aa';
    }
    var bbBW=document.getElementById('mktBBBW');if(bbBW)bbBW.textContent='Bandwidth: '+(bb.bb_bandwidth||0).toFixed(2)+'%';
  }
}

function switchTab(tab){
  var links=document.querySelectorAll('.nav a');
  links.forEach(function(l){
    l.className=l.getAttribute('data-tab')===tab?'on':'';
  });
  renderTab(tab);
}
</script>
<script>
// === BOT ===
function pnlC(pnl){return pnl>0?'g':(pnl<0?'r':'');}

function drawMACDChart(canvasId,data,label){
  if(!data||typeof Chart==='undefined')return;
  var canvas=document.getElementById(canvasId);
  if(!canvas)return;
  var macdArr=(data.macd_history||[]).slice(-40);
  var sigArr=(data.signal_history||[]).slice(-40);
  var histArr=(data.hist_history||[]).slice(-40);
  var maxLen=Math.max(macdArr.length,sigArr.length,histArr.length);
  while(macdArr.length<maxLen)macdArr.unshift(0);
  while(sigArr.length<maxLen)sigArr.unshift(0);
  while(histArr.length<maxLen)histArr.unshift(0);
  if(maxLen<3)return;
  var labels=[];for(var i=0;i<maxLen;i++)labels.push('');
  var hc=histArr.map(function(v){return v>=0?'rgba(0,212,170,0.6)':'rgba(255,71,87,0.6)'});
  var hb=histArr.map(function(v){return v>=0?'#00d4aa':'#ff4757'});
  var lc=label==='M1'?'#00d4aa':'#ff6b6b';
  if(_chartInstances[canvasId]){
    var ch=_chartInstances[canvasId];
    try{if(ch.canvas&&document.body.contains(ch.canvas)){
      ch.data.labels=labels;ch.data.datasets[0].data=histArr;
      ch.data.datasets[0].backgroundColor=hc;ch.data.datasets[0].borderColor=hb;
      ch.data.datasets[1].data=macdArr;ch.data.datasets[2].data=sigArr;
      ch.update('none');return;
    }}catch(ex){}
    try{ch.destroy();}catch(ex){}
    _chartInstances[canvasId]=null;
  }
  try{_chartInstances[canvasId]=new Chart(canvas.getContext('2d'),{
    type:'bar',data:{labels:labels,datasets:[
      {type:'bar',label:'Histogram',data:histArr,backgroundColor:hc,borderColor:hb,borderWidth:1,barPercentage:0.7,order:3,yAxisID:'y'},
      {type:'line',label:'MACD Line',data:macdArr,borderColor:lc,backgroundColor:'transparent',borderWidth:2,pointRadius:0,tension:0.3,order:1,yAxisID:'y'},
      {type:'line',label:'Signal Line',data:sigArr,borderColor:'#ff9f43',backgroundColor:'transparent',borderWidth:1.5,pointRadius:0,tension:0.3,borderDash:[4,2],order:2,yAxisID:'y'}
    ]},options:{responsive:true,maintainAspectRatio:false,animation:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:true,position:'top',labels:{color:'#5a5550',font:{family:'monospace',size:9},boxWidth:8,padding:6,usePointStyle:true}}},
      scales:{x:{display:false,grid:{display:false}},y:{position:'right',grid:{color:'rgba(42,42,42,0.4)',lineWidth:0.5},
        ticks:{color:'#5a5550',font:{family:'monospace',size:8},maxTicksLimit:5,callback:function(v){return v.toFixed(6)}}}}
    }
  });}catch(ex){}
}

function renderBacktest(c){
  c.innerHTML=
    '<div class="card"><h3>Backtest</h3>'+
      '<div class="row">'+
        '<div class="col"><label>Pair</label><input id="btPair" class="input" type="text" value="BTCUSDT"></div>'+
        '<div class="col"><label>Period</label><select id="btPeriod" class="input"><option value="1day">1 Day</option><option value="4h">4H</option><option value="1h">1H</option></select></div>'+
        '<div class="col"><label>Days</label><input id="btDays" class="input" type="number" value="30" min="7" max="365"></div>'+
      '</div>'+
      '<div class="row" style="margin-top:8px">'+
        '<div class="col"><label>M1 Fast</label><input id="btM1F" class="input" type="number" value="4"></div>'+
        '<div class="col"><label>M1 Slow</label><input id="btM1S" class="input" type="number" value="5"></div>'+
        '<div class="col"><label>M1 Signal</label><input id="btM1Sig" class="input" type="number" value="3"></div>'+
        '<div class="col"><label>TP %</label><input id="btTP" class="input" type="number" value="0.6" step="0.1"></div>'+
        '<div class="col"><label>SL %</label><input id="btSL" class="input" type="number" value="0.3" step="0.1"></div>'+
      '</div>'+
      '<button class="btn btn-start" id="btnBacktest" style="margin-top:12px;width:100%">Run Backtest</button>'+
    '</div>'+
    '<div id="btResult" style="margin-top:12px"></div>';
  document.getElementById('btnBacktest').onclick=function(){
    var btn=this;btn.disabled=true;btn.textContent='Running...';
    var params={
      symbol:document.getElementById('btPair').value,
      period:document.getElementById('btPeriod').value,
      days:parseInt(document.getElementById('btDays').value),
      m1_fast:parseInt(document.getElementById('btM1F').value),
      m1_slow:parseInt(document.getElementById('btM1S').value),
      m1_signal:parseInt(document.getElementById('btM1Sig').value),
      tp_percent:parseFloat(document.getElementById('btTP').value),
      sl_percent:parseFloat(document.getElementById('btSL').value)
    };
    api('POST','/api/backtest',params).then(function(r){
      var res=document.getElementById('btResult');
      if(r.error){res.innerHTML='<div class="card" style="color:var(--r)">'+r.error+'</div>';return;}
      var wr=r.win_rate||0;var wrCls=wr>=60?'g':(wr>=40?'':'r');
      var pf=r.profit_factor||0;var pfCls=pf>=1.5?'g':(pf>=1?'':'r');
      var totalPnl=r.total_pnl||0;var pnlCls=totalPnl>=0?'g':'r';
      res.innerHTML=
        '<div class="card"><h3>Backtest Results</h3>'+
          '<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:8px">'+
            '<div style="text-align:center;padding:10px;background:var(--s2);border-radius:6px"><div style="font-size:9px;color:var(--t3)">Win Rate</div><div class="'+wrCls+'" style="font-size:20px;font-weight:bold">'+wr.toFixed(1)+'%</div></div>'+
            '<div style="text-align:center;padding:10px;background:var(--s2);border-radius:6px"><div style="font-size:9px;color:var(--t3)">Profit Factor</div><div class="'+pfCls+'" style="font-size:20px;font-weight:bold">'+pf.toFixed(2)+'</div></div>'+
            '<div style="text-align:center;padding:10px;background:var(--s2);border-radius:6px"><div style="font-size:9px;color:var(--t3)">Total PnL</div><div class="'+pnlCls+'" style="font-size:20px;font-weight:bold">$'+totalPnl.toFixed(2)+'</div></div>'+
            '<div style="text-align:center;padding:10px;background:var(--s2);border-radius:6px"><div style="font-size:9px;color:var(--t3)">Trades</div><div style="font-size:20px;font-weight:bold">'+(r.total_trades||0)+'</div></div>'+
            '<div style="text-align:center;padding:10px;background:var(--s2);border-radius:6px"><div style="font-size:9px;color:var(--t3)">Wins</div><div class="g" style="font-size:20px;font-weight:bold">'+(r.wins||0)+'</div></div>'+
            '<div style="text-align:center;padding:10px;background:var(--s2);border-radius:6px"><div style="font-size:9px;color:var(--t3)">Losses</div><div class="r" style="font-size:20px;font-weight:bold">'+(r.losses||0)+'</div></div>'+
          '</div>'+
        '</div>';
      btn.disabled=false;btn.textContent='Run Backtest';
    }).catch(function(e){alert('Error: '+e.message);btn.disabled=false;btn.textContent='Run Backtest';});
  };
}

function renderBot(c){
  if(window._botInterval){clearInterval(window._botInterval);window._botInterval=null;}
  c.innerHTML='<div style="color:var(--t3);padding:20px">Loading Bot...</div>';
  Promise.all([
    api('GET','/api/bot/status-public').catch(function(){return{running:false,m1:{},m5:{},logs:[],position:null,ws_connected:false,current_price:0};}),
    api('GET','/api/market/live').catch(function(){return{price:0,m1:{},m5:{}};}),
    api('GET','/api/bot/config').catch(function(){return{mode:'spot',balance_type:'demo',m1:{fast:4,slow:5,signal:3},m5:{fast:4,slow:5,signal:3},tp_percent:2.5,sl_percent:1.5,order_size:50};})
  ]).then(function(r){
    var s=r[0],live=r[1],cfg=r[2];
    var price=s.current_price||live.price||0;
    var run=s.running||false;
    var m1=s.m1||{};var m5=s.m5||{};
    var m1live=live.m1||{};var m5live=live.m5||{};
    var aligned=s.aligned||false;
    var tradeSignal=s.trade_signal||'NEUTRAL';
    var mode=cfg.mode||'spot';
    var balType=cfg.balance_type||'demo';
    var wsOk=live.connected||s.ws_connected||false;

    var m1sig=m1live.signal||m1.signal||'-';
    var m5sig=m5live.signal||m5.signal||'-';
    var m1rsi=m1live.rsi||m1.rsi||0;
    var m5rsi=m5live.rsi||m5.rsi||0;
    var m1macd=m1live.macd||m1.macd||0;
    var m5macd=m5live.macd||m5.macd||0;
    var m1bs=m1.buy_sell||'WAIT';
    var m5bs=m5.buy_sell||'WAIT';

    var m1cls=m1sig==='LONG'?'g':(m1sig==='SHORT'?'r':'');
    var m5cls=m5sig==='LONG'?'g':(m5sig==='SHORT'?'r':'');
    var alignCls=aligned?'g':'r';
    var tradeCls=tradeSignal==='LONG'?'g':(tradeSignal==='SHORT'?'r':'');
    var m1bsCls=m1bs==='BUY'||m1bs==='HOLD_LONG'?'g':(m1bs==='SELL'||m1bs==='HOLD_SHORT'?'r':'');
    var m5bsCls=m5bs==='BUY'||m5bs==='HOLD_LONG'?'g':(m5bs==='SELL'||m5bs==='HOLD_SHORT'?'r':'');

    // Position HTML
    var posHtml='';
    if(s.position){
      var pc=s.position.side==='LONG'?'g':'r';
      var upnl=s.position.unrealized_pnl||0;
      posHtml='<div class="card"><h3>Active Position</h3><div class="row">'+
        '<div class="col"><h4>Side</h4><div class="v '+pc+'">'+s.position.side+'</div></div>'+
        '<div class="col"><h4>Entry</h4><div class="v">$'+s.position.entry.toLocaleString()+'</div></div>'+
        '<div class="col"><h4>Current</h4><div class="v">$'+price.toLocaleString(undefined,{minimumFractionDigits:2})+'</div></div>'+
        '<div class="col"><h4>TP</h4><div class="v g">$'+s.position.tp.toLocaleString()+'</div></div>'+
        '<div class="col"><h4>SL</h4><div class="v r">$'+s.position.sl.toLocaleString()+'</div></div>'+
        '<div class="col"><h4>PnL</h4><div class="v '+(upnl>=0?'g':'r')+'">$'+upnl.toFixed(2)+'</div></div>'+
      '</div></div>';
    }

    // Logs
    var logsHtml='';
    if(s.logs&&s.logs.length>0){
      logsHtml=s.logs.slice().reverse().map(function(l){
        return '<div style="font-size:11px;padding:2px 0;border-bottom:1px solid var(--b)"><span style="color:var(--t3)">'+l.time+'</span> <span class="'+pnlC(l.pnl)+'">'+l.msg+'</span></div>';
      }).join('');
    } else {
      logsHtml='<div style="color:var(--t3)">No logs</div>';
    }

    // Strategy info
    var m1cfg=cfg.m1||{fast:4,slow:5,signal:3};
    var m5cfg=cfg.m5||{fast:4,slow:5,signal:3};

    c.innerHTML=
      // Status bar
      '<div class="card" style="padding:12px">'+
        '<div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap">'+
          '<span style="font-size:11px;padding:4px 10px;border-radius:10px;background:'+(run?'rgba(0,212,170,0.15)':'rgba(255,71,87,0.15)')+';color:'+(run?'var(--a)':'var(--r)')+';font-weight:bold">'+(run?'RUNNING':'STOPPED')+'</span>'+
          '<span style="font-size:11px;padding:4px 10px;border-radius:10px;background:'+(wsOk?'rgba(0,212,170,0.15)':'rgba(255,71,87,0.15)')+';color:'+(wsOk?'var(--a)':'var(--r)')+'">WS: '+(wsOk?'Connected':'Disconnected')+'</span>'+
          '<span class="v" style="font-size:18px" id="botPrice">$'+price.toLocaleString(undefined,{minimumFractionDigits:2})+'</span>'+
          '<span style="font-size:11px;color:var(--t3)">'+mode.toUpperCase()+' | '+(balType==='demo'?'DEMO':'REAL')+'</span>'+
        '</div>'+
      '</div>'+
      // Controls
      '<div style="display:flex;gap:8px;margin:12px 0">'+
        '<button class="btn btn-start" id="btnStart" style="flex:1;font-size:14px;padding:14px" '+(run?'disabled':'')+'>▶ START</button>'+
        '<button class="btn btn-stop" id="btnStop" style="flex:1;font-size:14px;padding:14px" '+(run?'':'disabled')+'>⏹ STOP</button>'+
      '</div>'+
      // Live Signals M1 + M5
      '<div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px">'+
        // M1
        '<div style="background:var(--s);border-left:3px solid var(--a);border-radius:8px;padding:12px">'+
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
            '<span style="font-size:14px;font-weight:bold;color:var(--a)">M1 Signal</span>'+
            '<span class="'+m1cls+'" style="font-size:18px;font-weight:bold" id="botM1Sig">'+m1sig+'</span>'+
          '</div>'+
          '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;font-size:11px">'+
            '<div style="text-align:center;background:var(--s2);padding:6px;border-radius:4px"><div style="color:var(--t3)">MACD</div><div id="botM1Macd" style="font-weight:bold">'+m1macd.toFixed(6)+'</div></div>'+
            '<div style="text-align:center;background:var(--s2);padding:6px;border-radius:4px"><div style="color:var(--t3)">RSI</div><div id="botM1Rsi" style="font-weight:bold;color:'+(m1rsi>70?'var(--r)':(m1rsi<28?'var(--a)':'var(--t1)'))+'">'+m1rsi.toFixed(1)+'</div></div>'+
            '<div style="text-align:center;background:var(--s2);padding:6px;border-radius:4px"><div style="color:var(--t3)">Buy/Sell</div><div class="'+m1bsCls+'" style="font-weight:bold" id="botM1BS">'+m1bs+'</div></div>'+
          '</div>'+
          '<div style="margin-top:6px;position:relative;height:140px"><canvas id="chartM1"></canvas></div>'+
        '</div>'+
        // M5
        '<div style="background:var(--s);border-left:3px solid #ff6b6b;border-radius:8px;padding:12px">'+
          '<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">'+
            '<span style="font-size:14px;font-weight:bold;color:#ff6b6b">M5 Signal</span>'+
            '<span class="'+m5cls+'" style="font-size:18px;font-weight:bold" id="botM5Sig">'+m5sig+'</span>'+
          '</div>'+
          '<div style="display:grid;grid-template-columns:1fr 1fr 1fr;gap:4px;font-size:11px">'+
            '<div style="text-align:center;background:var(--s2);padding:6px;border-radius:4px"><div style="color:var(--t3)">MACD</div><div id="botM5Macd" style="font-weight:bold">'+m5macd.toFixed(6)+'</div></div>'+
            '<div style="text-align:center;background:var(--s2);padding:6px;border-radius:4px"><div style="color:var(--t3)">RSI</div><div id="botM5Rsi" style="font-weight:bold;color:'+(m5rsi>70?'var(--r)':(m5rsi<28?'var(--a)':'var(--t1)'))+'">'+m5rsi.toFixed(1)+'</div></div>'+
            '<div style="text-align:center;background:var(--s2);padding:6px;border-radius:4px"><div style="color:var(--t3)">Buy/Sell</div><div class="'+m5bsCls+'" style="font-weight:bold" id="botM5BS">'+m5bs+'</div></div>'+
          '</div>'+
          '<div style="margin-top:6px;position:relative;height:140px"><canvas id="chartM5"></canvas></div>'+
        '</div>'+
      '</div>'+
      // Combined Signal
      '<div class="card" style="text-align:center;padding:16px">'+
        '<div style="font-size:11px;color:var(--t3);margin-bottom:4px">Combined Signal</div>'+
        '<div class="'+tradeCls+'" style="font-size:24px;font-weight:bold" id="botTradeSignal">'+tradeSignal+'</div>'+
        '<div style="font-size:11px;color:var(--t3);margin-top:4px">M1: <span id="botM1BS2" class="'+m1bsCls+'">'+m1bs+'</span> | M5: <span id="botM5BS2" class="'+m5bsCls+'">'+m5bs+'</span> | Alignment: <span class="'+alignCls+'">'+(aligned?'YES':'NO')+'</span></div>'+
      '</div>'+
      // Position
      posHtml+
      // Logs
      '<div class="card"><h3>Bot Logs <span id="logCount" style="font-size:10px;color:var(--t3)">'+((s.logs||[]).length)+'</span></h3><div id="botLogsDiv" style="max-height:250px;overflow-y:auto;font-family:monospace">'+logsHtml+'</div></div>'+
      // Strategy display
      '<div class="card"><h3>Active Strategy</h3>'+
        '<div style="display:flex;gap:8px;flex-wrap:wrap;font-size:11px;color:var(--t3)">'+
          '<span style="background:var(--s);padding:4px 8px;border-radius:4px">MACD M1: '+m1cfg.fast+'/'+m1cfg.slow+'/'+m1cfg.signal+'</span>'+
          '<span style="background:var(--s);padding:4px 8px;border-radius:4px">MACD M5: '+m5cfg.fast+'/'+m5cfg.slow+'/'+m5cfg.signal+'</span>'+
          '<span style="background:var(--s);padding:4px 8px;border-radius:4px">TP: '+(cfg.tp_percent||2.5)+'% | SL: '+(cfg.sl_percent||1.5)+'%</span>'+
          '<span style="background:var(--s);padding:4px 8px;border-radius:4px">Size: $'+(cfg.order_size||50)+'</span>'+
          '<a href="#" onclick="switchTab(\'config\');return false" style="color:var(--a);padding:4px 8px">Edit in Config →</a>'+
        '</div>'+
      '</div>';

    // Start/Stop handlers
    document.getElementById('btnStart').addEventListener('click',function(ev){
      ev.preventDefault();this.disabled=true;this.textContent='Starting...';
      api('POST','/api/bot/start-public').then(function(r){
        alert(r&&r.msg?r.msg:'Bot started');
        renderBot(document.getElementById('content'));
      }).catch(function(e){alert('Error: '+e.message);});
    },false);
    document.getElementById('btnStop').addEventListener('click',function(ev){
      ev.preventDefault();this.disabled=true;this.textContent='Stopping...';
      api('POST','/api/bot/stop-public').then(function(r){
        alert(r&&r.msg?r.msg:'Bot stopped');
        renderBot(document.getElementById('content'));
      }).catch(function(e){alert('Error: '+e.message);});
    },false);

    // Draw initial MACD charts
    setTimeout(function(){
      if(typeof drawMACDChart==='function'){
        drawMACDChart('chartM1',m1,'M1');
        drawMACDChart('chartM5',m5,'M5');
      }
    },100);

    // Live polling
    window._botInterval=setInterval(function(){
      Promise.all([
        api('GET','/api/bot/status-public').catch(function(){return{};}),
        api('GET','/api/market/live').catch(function(){return{};})
      ]).then(function(rs){
        try{
          var st=rs[0]||{},lv=rs[1]||{};
          var e;
          // Price
          var p=lv.price||st.current_price||0;
          e=document.getElementById('botPrice');if(e)e.textContent='$'+p.toLocaleString(undefined,{minimumFractionDigits:2});
          // M1 live
          if(lv.m1){
            e=document.getElementById('botM1Sig');if(e){var s1=lv.m1.signal||'-';e.textContent=s1;e.className=s1==='LONG'?'g':(s1==='SHORT'?'r':'');}
            e=document.getElementById('botM1Macd');if(e)e.textContent=(lv.m1.macd||0).toFixed(6);
            e=document.getElementById('botM1Rsi');if(e){var r1=lv.m1.rsi||0;e.textContent=r1.toFixed(1);e.style.color=r1>70?'var(--r)':(r1<28?'var(--a)':'var(--t1)');}
          }
          if(lv.m5){
            e=document.getElementById('botM5Sig');if(e){var s5=lv.m5.signal||'-';e.textContent=s5;e.className=s5==='LONG'?'g':(s5==='SHORT'?'r':'');}
            e=document.getElementById('botM5Macd');if(e)e.textContent=(lv.m5.macd||0).toFixed(6);
            e=document.getElementById('botM5Rsi');if(e){var r5=lv.m5.rsi||0;e.textContent=r5.toFixed(1);e.style.color=r5>70?'var(--r)':(r5<28?'var(--a)':'var(--t1)');}
          }
          // Signals
          if(st.trade_signal){
            e=document.getElementById('botTradeSignal');if(e){e.textContent=st.trade_signal;e.className=st.trade_signal==='LONG'?'g':(st.trade_signal==='SHORT'?'r':'');}
          }
          if(st.m1){
            e=document.getElementById('botM1BS');if(e){e.textContent=st.m1.buy_sell||'WAIT';}
            e=document.getElementById('botM1BS2');if(e){e.textContent=st.m1.buy_sell||'WAIT';}
          }
          if(st.m5){
            e=document.getElementById('botM5BS');if(e){e.textContent=st.m5.buy_sell||'WAIT';}
            e=document.getElementById('botM5BS2');if(e){e.textContent=st.m5.buy_sell||'WAIT';}
          }
          // Logs
          if(st.logs&&st.logs.length>0){
            e=document.getElementById('botLogsDiv');if(e)e.innerHTML=st.logs.slice().reverse().map(function(l){return '<div style="font-size:11px;padding:2px 0;border-bottom:1px solid var(--b)"><span style="color:var(--t3)">'+l.time+'</span> <span class="'+pnlC(l.pnl)+'">'+l.msg+'</span></div>';}).join('');
            e=document.getElementById('logCount');if(e)e.textContent=st.logs.length;
          }
          // Update MACD charts from live data
          var m1d=(st.m1&&st.m1.macd_history&&st.m1.macd_history.length>0)?st.m1:(lv.m1||{});
          var m5d=(st.m5&&st.m5.macd_history&&st.m5.macd_history.length>0)?st.m5:(lv.m5||{});
          if(typeof drawMACDChart==='function'){
            if(m1d.macd_history&&m1d.macd_history.length>0)drawMACDChart('chartM1',m1d,'M1');
            if(m5d.macd_history&&m5d.macd_history.length>0)drawMACDChart('chartM5',m5d,'M5');
          }
        }catch(ex){}
      }).catch(function(){});
    },1000);
  }).catch(function(e){c.innerHTML='<div class="card" style="color:var(--r)">Error: '+e.message+'</div>';});
}
</script>
<script>
// === TRADING ===

      '</div>'+

        '<span><b style="color:var(--r)">L:</b> <span id="spotLow24">$'+((tk.low24h||0)).toLocaleString(undefined,{minimumFractionDigits:2})+'</span></span>'+
        '<span><b style="color:var(--t2)">24h:</b> <span id="spotChange">'+((tk.change24h||0)*100).toFixed(2)+'%</span></span>'+
        '<span style="background:var(--s);padding:2px 6px;border-radius:4px"><b>M1:</b> <span id="spotM1Sig">'+(m1d.signal||'-')+' RSI:'+(m1d.rsi!==undefined?m1d.rsi.toFixed(1):'-')+'</span></span>'+
        '<span style="background:var(--s);padding:2px 6px;border-radius:4px"><b>M5:</b> <span id="spotM5Sig">'+(m5d.signal||'-')+' RSI:'+(m5d.rsi!==undefined?m5d.rsi.toFixed(1):'-')+'</span></span>'+
      '</div>'+
      // Quick Trade
      '<div class="card"><h3>Quick Trade</h3>'+
        '<div style="display:grid;grid-template-columns:1fr 1fr;gap:12px">'+
          '<div style="background:rgba(0,212,170,0.08);border:1px solid rgba(0,212,170,0.3);border-radius:8px;padding:12px">'+
            '<h4 style="color:var(--a);margin-bottom:8px">BUY</h4>'+
            '<div class="row"><div class="col"><label>Amount (USDT)</label><input id="spotBuyAmt" class="input" type="number" value="50" min="1" step="1"></div></div>'+

      api('POST','/api/spot/cancel-all',{symbol:pair}).then(function(r){alert(r.msg||'Done');renderSpot(c);}).catch(function(e){alert('Error: '+e.message);});
    };

    // Live price update

<script>
// === MARKET DUAL TF INDEPENDENT ===

function mktCalcEMA(data,period){var k=2/(period+1),r=[],prev=data[0].close;for(var i=0;i<data.length;i++){if(i===0)prev=data[i].close;else prev=data[i].close*k+prev*(1-k);r.push({time:data[i].time,value:prev});}return r;}

function mktCalcSMA(data,period){var r=[];for(var i=period-1;i<data.length;i++){var s=0;for(var j=i-period+1;j<=i;j++)s+=data[j].close;r.push({time:data[i].time,value:s/period});}return r;}

function mktCalcRSI(data,period){var r=[],g=0,l=0;if(data.length<period+1)return[];for(var i=1;i<=period;i++){var d=data[i].close-data[i-1].close;if(d>=0)g+=d;else l-=d;}var aG=g/period,aL=l/period;r.push({time:data[period].time,value:aL===0?100:100-100/(1+aG/aL)});for(var i=period+1;i<data.length;i++){var d=data[i].close-data[i-1].close;var gg=d>0?d:0,ll=d<0?-d:0;aG=(aG*(period-1)+gg)/period;aL=(aL*(period-1)+ll)/period;r.push({time:data[i].time,value:aL===0?100:100-100/(1+aG/aL)});}return r;}

function mktCalcMACD(data,fast,slow,signal){var f=fast||12,sl=slow||26,sg=signal||9;var ef=mktCalcEMA(data,f),es=mktCalcEMA(data,sl);var line=[];for(var i=0;i<ef.length;i++)line.push({time:ef[i].time,value:ef[i].value-es[i].value});var arr=line.map(function(d){return{time:d.time,close:d.value};});var sig=mktCalcEMA(arr,sg);var hist=[];for(var i=0;i<line.length;i++)hist.push({time:line[i].time,value:line[i].value-(sig[i]?sig[i].value:0)});return{line:line,signal:sig,hist:hist};}

function mktCalcBB(data,p,std){var r=[];for(var i=p-1;i<data.length;i++){var s=0;for(var j=i-p+1;j<=i;j++)s+=data[j].close;var m=s/p;var v=0;for(var j=i-p+1;j<=i;j++)v+=Math.pow(data[j].close-m,2);var st=Math.sqrt(v/p);r.push({time:data[i].time,upper:m+std*st,lower:m-std*st,middle:m});}return r;}

function mktCalcSAR(data){if(data.length<3)return[];var sar=[],af=0.02;var isUp=true,ep=data[0].high,sv=data[0].low;sar.push({time:data[0].time,value:sv});for(var i=1;i<data.length;i++){var prev=sar[i-1].value;if(isUp){sv=prev+af*(ep-prev);if(data[i].low<sv){isUp=false;sv=ep;ep=data[i].low;af=0.02;}else if(data[i].high>ep){ep=data[i].high;af=Math.min(af+0.02,0.2);}}else{sv=prev+af*(ep-prev);if(data[i].high>sv){isUp=true;sv=ep;ep=data[i].high;af=0.02;}else if(data[i].low<ep){ep=data[i].low;af=Math.min(af+0.02,0.2);}}sar.push({time:data[i].time,value:sv});}return sar;}

function mktCalcVWAP(data){var cumPV=0,cumVol=0,r=[];for(var i=0;i<data.length;i++){var tp=(data[i].high+data[i].low+data[i].close)/3;cumPV+=tp*(data[i].volume||1);cumVol+=(data[i].volume||1);r.push({time:data[i].time,value:cumPV/cumVol});}return r;}

function mktCalcStoch(data,kPeriod,dPeriod){if(data.length<kPeriod)return{k:[],d:[]};var kArr=[];for(var i=kPeriod-1;i<data.length;i++){var hh=-Infinity,ll=Infinity;for(var j=i-kPeriod+1;j<=i;j++){if(data[j].high>hh)hh=data[j].high;if(data[j].low<ll)ll=data[j].low;}kArr.push({time:data[i].time,value:hh===ll?50:(data[i].close-ll)/(hh-ll)*100});}var dArr=[];for(var i=dPeriod-1;i<kArr.length;i++){var s=0;for(var j=i-dPeriod+1;j<=i;j++)s+=kArr[j].value;dArr.push({time:kArr[i].time,value:s/dPeriod});}return{k:kArr,d:dArr};}

function mktCalcCMF(data,period){if(data.length<period)return[];var r=[];for(var i=0;i<data.length;i++){var start=Math.max(0,i-period+1),sumMFV=0,sumVol=0;for(var j=start;j<=i;j++){var tp=(data[j].high+data[j].low+data[j].close)/3;var vol=data[j].volume||1;var hlRange=data[j].high-data[j].low;var mfm=hlRange===0?0:((tp-data[j].low)-(data[j].high-tp))/hlRange;sumMFV+=mfm*vol;sumVol+=vol;}r.push({time:data[i].time,value:sumVol===0?0:sumMFV/sumVol});}return r;}

function _drawFootprintChart(canvasId,fp,livePrice){
  var canvas=document.getElementById(canvasId);if(!canvas||!fp)return;
  var ctx=canvas.getContext('2d');var dpr=window.devicePixelRatio||1;
  var rect=canvas.getBoundingClientRect();canvas.width=rect.width*dpr;canvas.height=rect.height*dpr;
  ctx.scale(dpr,dpr);var W=rect.width,H=rect.height;var L=80,R=70,T=30,B=30;var cW=W-L-R,cH=H-T-B;
  ctx.fillStyle='#131722';ctx.fillRect(0,0,W,H);
  var profile=fp.profile||[];if(!profile.length){ctx.fillStyle='rgba(255,255,255,0.3)';ctx.font='14px sans-serif';ctx.textAlign='center';ctx.fillText('No footprint data',W/2,H/2);return;}
  var priceMin=fp.price_min||profile[0].price;var priceMax=fp.price_max||profile[profile.length-1].price;
  var priceRange=priceMax-priceMin||1;var maxVol=Math.max.apply(null,profile.map(function(p){return Math.max(p.bid_vol,p.ask_vol);}).concat([0.001]));
  function Y(p){return T+cH-(p-priceMin)/priceRange*cH;}
  var barH=Math.max(cH/profile.length-1,2);
  for(var i=0;i<profile.length;i++){var p=profile[i];var y=Y(p.price)-barH/2;var bidW=(p.bid_vol/maxVol)*(cW/2);var askW=(p.ask_vol/maxVol)*(cW/2);var midX=L+cW/2;if(p.bid_vol>0){ctx.fillStyle='rgba(38,166,154,0.5)';ctx.fillRect(midX-bidW,y,bidW,barH);}if(p.ask_vol>0){ctx.fillStyle='rgba(239,83,80,0.5)';ctx.fillRect(midX,y,askW,barH);}if(i%Math.max(1,Math.floor(profile.length/12))===0){ctx.fillStyle='rgba(209,212,220,0.4)';ctx.font='9px monospace';ctx.textAlign='right';ctx.fillText('$'+p.price.toFixed(2),L-4,y+barH/2+3);}}
  if(fp.poc>0){var pocY=Y(fp.poc);ctx.strokeStyle='#e8c547';ctx.lineWidth=2;ctx.setLineDash([6,3]);ctx.beginPath();ctx.moveTo(L,pocY);ctx.lineTo(L+cW,pocY);ctx.stroke();ctx.setLineDash([]);ctx.fillStyle='#e8c547';ctx.font='bold 10px monospace';ctx.textAlign='left';ctx.fillText('POC $'+fp.poc.toFixed(2),L+cW+4,pocY+4);}
  if(fp.hva_low>0&&fp.hva_high>0){var h1=Y(fp.hva_high),h2=Y(fp.hva_low);ctx.fillStyle='rgba(232,197,71,0.08)';ctx.fillRect(L,Math.min(h1,h2),cW,Math.abs(h2-h1));ctx.strokeStyle='rgba(232,197,71,0.3)';ctx.lineWidth=1;ctx.setLineDash([3,3]);ctx.beginPath();ctx.moveTo(L,h1);ctx.lineTo(L+cW,h1);ctx.stroke();ctx.beginPath();ctx.moveTo(L,h2);ctx.lineTo(L+cW,h2);ctx.stroke();ctx.setLineDash([]);}
  if(livePrice&&livePrice>0){var ly=Y(livePrice);ctx.strokeStyle='#26a69a';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(L,ly);ctx.lineTo(L+cW,ly);ctx.stroke();ctx.fillStyle='#26a69a';ctx.fillRect(L+cW+2,ly-9,62,18);ctx.fillStyle='#fff';ctx.font='bold 10px monospace';ctx.textAlign='center';ctx.fillText('$'+livePrice.toFixed(2),L+cW+33,ly+4);}
}

  var allSizes=bids.concat(asks).map(function(x){return x[1];});var maxSize=Math.max.apply(null,allSizes.concat([0.001]));
  var maxBidWall=bids.reduce(function(mx,b){return b[1]>mx[1]?b:mx;},[0,0]);var maxAskWall=asks.reduce(function(mx,a){return a[1]>mx[1]?a:mx;},[0,0]);
  var cumBid=0,cumAsk=0;bids.forEach(function(b){cumBid+=b[1];});asks.forEach(function(a){cumAsk+=a[1];});

  var cumBidArr=[];var cum=0;for(var i=0;i<bids.length;i++){cum+=bids[i][1];cumBidArr.push(cum);}

    var askHtml='';if(askRow){var aw=(askRow[1]/maxSize*100).toFixed(0);var adw=(cumAskArr[i]/maxCum*100).toFixed(0);var hl=Math.abs(askRow[0]-price)<(price*0.001)?'background:rgba(239,83,80,0.08)':'';askHtml='<div style="position:relative;padding:2px 6px;'+hl+'"><div style="position:absolute;right:0;top:0;bottom:0;width:'+adw+'%;background:rgba(239,83,80,0.06)"></div><div style="position:absolute;right:0;top:0;bottom:0;width:'+aw+'%;background:rgba(239,83,80,0.15)"></div><span style="position:relative;font-weight:bold;color:#ef5350">'+askRow[1].toFixed(4)+'</span><span style="position:relative;float:left;font-size:9px;color:var(--t3)">'+cumAskArr[i].toFixed(4)+'</span></div>';}else{askHtml='<div style="padding:2px 6px">&nbsp;</div>';}

  }
  html+='<div style="display:grid;grid-template-columns:1fr 55px 1fr;padding:6px;background:rgba(30,34,45,0.8);font-size:11px;font-weight:bold"><div style="text-align:center;color:#26a69a">Total: '+cumBid.toFixed(4)+'</div><div style="text-align:center;color:var(--t2)">'+(bidPct>askPct?'BUYERS':'SELLERS')+'</div><div style="text-align:center;color:#ef5350">Total: '+cumAsk.toFixed(4)+'</div></div>';
  body.innerHTML=html;var ds=document.getElementById('mktDomTs');if(ds)ds.textContent='DOM: '+new Date().toLocaleTimeString();

// === EXTENDED CALC FUNCTIONS ===
function mktCalcDonchian(data,period){var out=[];if(!data||data.length<period)return out;for(var i=period-1;i<data.length;i++){var hh=-Infinity,ll=Infinity;for(var j=i-period+1;j<=i;j++){if(data[j].high>hh)hh=data[j].high;if(data[j].low<ll)ll=data[j].low;}out.push({time:data[i].time,upper:hh,lower:ll,middle:(hh+ll)/2});}return out;}
function mktCalcKeltner(data,period,mult){var out=[];if(!data||data.length<period)return out;var ema=mktCalcEMA(data,period);if(!ema.length)return out;for(var i=1;i<data.length;i++){var atr=0,cnt=0;for(var j=Math.max(1,i-period+1);j<=i;j++){atr+=Math.abs(data[j].high-data[j].low);cnt++;}atr/=cnt;var ei=-1;for(var e=0;e<ema.length;e++){if(ema[e].time===data[i].time){ei=e;break;}}if(ei>=0)out.push({time:data[i].time,upper:ema[ei].value+atr*mult,lower:ema[ei].value-atr*mult,middle:ema[ei].value});}return out;}
function mktCalcElderRay(data,period){var out=[];if(!data||data.length<period)return out;var ema=mktCalcEMA(data,period);if(!ema.length)return out;for(var i=0;i<ema.length;i++){var di=-1;for(var j=0;j<data.length;j++){if(data[j].time===ema[i].time){di=j;break;}}if(di>=0)out.push({time:ema[i].time,bulls:data[di].high-ema[i].value,bears:data[di].low-ema[i].value});}return out;}
function mktCalcDMI(data,period){var out=[];if(!data||data.length<period+1)return out;for(var i=period;i<data.length;i++){var pdm=0,mdm=0,tr=0;for(var j=i-period+1;j<=i;j++){var upMove=data[j].high-data[j-1].high;var downMove=data[j-1].low-data[j].low;if(upMove>downMove&&upMove>0)pdm+=upMove;if(downMove>upMove&&downMove>0)mdm+=downMove;var hl=data[j].high-data[j].low;var hc=Math.abs(data[j].high-data[j-1].close);var lc=Math.abs(data[j].low-data[j-1].close);tr+=Math.max(hl,hc,lc);}var pdi=tr>0?(pdm/tr)*100:0;var mdi=tr>0?(mdm/tr)*100:0;var dx=Math.abs(pdi-mdi)>0?(Math.abs(pdi-mdi)/(pdi+mdi))*100:0;out.push({time:data[i].time,pdi:pdi,mdi:mdi,adx:dx});}return out;}
function mktCalcPivot(data){var out=[];if(!data||data.length<2)return out;for(var i=1;i<data.length;i++){var prev=data[i-1];var pp=(prev.high+prev.low+prev.close)/3;out.push({time:data[i].time,pivot:pp,r1:2*pp-prev.low,s1:2*pp-prev.high});}return out;}
function mktCalcTrendlines(data,lookback){var out=[];if(!data||data.length<lookback)return out;for(var i=lookback;i<data.length;i++){var seg=data.slice(i-lookback,i);var hh=-Infinity,ll=Infinity;for(var j=0;j<seg.length;j++){if(seg[j].high>hh)hh=seg[j].high;if(seg[j].low<ll)ll=seg[j].low;}out.push({time:data[i].time,resistance:hh,support:ll});}return out;}
function mktDetectPatterns(data){var out=[];if(!data||data.length<3)return out;for(var i=2;i<data.length;i++){var c=data[i],p=data[i-1],pp=data[i-2];var body=Math.abs(c.close-c.open),range=c.high-c.low,pbody=Math.abs(p.close-p.open);var pat='';if(range>0&&body/range<0.35&&(c.open>c.low+range*0.6||c.close>c.low+range*0.6)&&c.close>c.open)pat='hammer';if(range>0&&body/range<0.35&&(c.open<c.high-range*0.6||c.close<c.high-range*0.6)&&c.close<c.open)pat='shooting_star';if(p.close<p.open&&c.close>c.open&&c.open<=p.close&&c.close>=p.open)pat='bullish_engulf';if(p.close>p.open&&c.close<c.open&&c.open>=p.close&&c.close<=p.open)pat='bearish_engulf';if(pp.close<pp.open&&pbody<(Math.abs(pp.close-pp.open)*0.3)&&c.close>c.open&&c.close>(pp.open+pp.close)/2)pat='morning_star';if(pp.close>pp.open&&pbody<(Math.abs(pp.close-pp.open)*0.3)&&c.close<c.open&&c.close<(pp.open+pp.close)/2)pat='evening_star';out.push({time:c.time,pattern:pat});}return out;}

// === INIT ===
function _mktInit(){
  api('GET','/api/config-public').then(function(cfg){
    var ci=cfg.chart_indicators||{};
    window._mkt.indConfig=ci;
    window._mkt.indConfig.m1=ci.m1||{};
    window._mkt.indConfig.m5=ci.m5||{};
    window._mkt.pair=cfg.pair||'BTCUSDT';
    document.getElementById('mktPair').textContent=window._mkt.pair;

    // Init M1
    if(cfg.m1_enabled!==false)_mktInitTF('M1',ci.m1||{});
    // Init M5
    if(cfg.m5_enabled===true)_mktInitTF('M5',ci.m5||{});

    // Price polling
    // Auto-refresh footprint + DOM every 10s
    window._mkt.fpDomTimer=setInterval(function(){
      var tf=window._mkt.activeTF;
      if(document.getElementById('mkt'+tf+'FP'))_mktLoadFootprint(tf);
      if(document.getElementById('mkt'+tf+'DOM'))_mktLoadDOM(tf);
    },10000);

    window._mkt.pollTimer=setInterval(function(){
      api('GET','/api/market/live').then(function(d){
        if(!d)return;
        if(d.price){var e=document.getElementById('mktPrice');if(e)e.textContent='$'+parseFloat(d.price).toLocaleString(undefined,{minimumFractionDigits:2});}
        var e=document.getElementById('mktLastUpdate');if(e)e.textContent=new Date().toLocaleTimeString();
        ['M1','M5'].forEach(function(tf){var s=d[tf.toLowerCase()];if(s){var el=document.getElementById('mkt'+tf+'Signal');if(el){el.textContent=s.signal||'--';el.style.color=s.signal==='BUY'?'var(--a)':s.signal==='SELL'?'var(--r)':'var(--t3)';}}});
      }).catch(function(){});
    },2000);

    // Footprint/DOM buttons
    ['M1','M5'].forEach(function(tf){
      var fpBtn=document.getElementById('mkt'+tf+'FPBtn');
      if(fpBtn)fpBtn.onclick=function(){_mktLoadFootprint(tf);};
      var domBtn=document.getElementById('mkt'+tf+'DOMBtn');
      if(domBtn)domBtn.onclick=function(){_mktLoadDOM(tf);};
    });

  }).catch(function(e){console.error('Config error:',e);});
}

// === INIT ONE TF ===
function _mktInitTF(tf,ciTf){
  var st=window._mkt[tf];var pair=window._mkt.pair;var gm=_gm[tf];
  var cid='mkt'+tf+'Chart';var oid='mkt'+tf+'Osc';

  // Restore from localStorage
  var cached=_mktLoadCache(tf);
  if(cached&&cached.length>50)st.candles=cached;

  // Create main chart
  try{
    var el=document.getElementById(cid);if(!el)return;
    st.chart=LightweightCharts.createChart(el,{
      width:el.offsetWidth||600,height:380,
      layout:{background:{type:'solid',color:'#0a0a0a'},textColor:'#888'},
      grid:{vertLines:{color:'rgba(42,42,42,0.3)'},horzLines:{color:'rgba(42,42,42,0.3)'}},
      crosshair:{mode:LightweightCharts.CrosshairMode.Normal},
      timeScale:{timeVisible:true,secondsVisible:false,borderColor:'rgba(42,42,42,0.5)'},
      rightPriceScale:{borderColor:'rgba(42,42,42,0.5)'}
    });
    st.series.candle=st.chart.addCandlestickSeries({upColor:'#26a69a',downColor:'#ef5350',borderUpColor:'#26a69a',borderDownColor:'#ef5350',wickUpColor:'#26a69a',wickDownColor:'#ef5350'});
    // Resize observer
    new ResizeObserver(function(){if(st.chart)st.chart.applyOptions({width:el.offsetWidth||600});}).observe(el);

    // If cached data, set it immediately
    if(st.candles.length>50){
      try{st.series.candle.setData(st.candles);}catch(e){}
    }
  }catch(e){console.error(tf+' chart:',e);return;}

  // Create osc chart
  try{
    var oel=document.getElementById(oid);if(!oel)return;
    st.osc=LightweightCharts.createChart(oel,{
      width:oel.offsetWidth||600,height:100,
      layout:{background:{type:'solid',color:'#0a0a0a'},textColor:'#888'},
      grid:{vertLines:{color:'rgba(42,42,42,0.2)'},horzLines:{color:'rgba(42,42,42,0.2)'}},
      timeScale:{timeVisible:true,secondsVisible:false,borderColor:'rgba(42,42,42,0.5)'},
      rightPriceScale:{borderColor:'rgba(42,42,42,0.5)'}
    });
    new ResizeObserver(function(){if(st.osc)st.osc.applyOptions({width:oel.offsetWidth||600});}).observe(oel);
    // Sync time scales
    st.chart.timeScale().subscribeVisibleLogicalRangeChange(function(r){if(r&&st.osc)try{st.osc.timeScale().setVisibleLogicalRange(r);}catch(e){}});
  }catch(e){console.error(tf+' osc:',e);}

  // Fetch fresh history
  _mktFetchHistory(tf,pair,gm.rest,function(){
    _mktSaveCache(tf);
    _mktApplyAll(tf,ciTf);
    _mktStartWS(tf,pair,gm.ws);
    _mktLoadFootprint(tf);
    _mktLoadDOM(tf);
  });
}

// === FETCH HISTORY ===
function _mktFetchHistory(tf,pair,gran,cb){
  var st=window._mkt[tf];
  api('GET','/api/market/candles?symbol='+pair+'&granularity='+gran+'&limit=200')
    .then(function(d){
      if(d.candles&&d.candles.length>0){
        var raw=d.candles.map(function(c){
          if(Array.isArray(c))return{time:parseInt(c[0])/1000,open:parseFloat(c[1]),high:parseFloat(c[2]),low:parseFloat(c[3]),close:parseFloat(c[4]),vol:parseFloat(c[5])};
          return{time:c.timestamp?c.timestamp/1000:c.time,open:c.open,high:c.high,low:c.low,close:c.close,vol:c.volume||c.vol||0};
        }).sort(function(a,b){return a.time-b.time;});
        var seen={};raw=raw.filter(function(c){if(seen[c.time])return false;seen[c.time]=true;return true;});
        st.candles=raw;
        if(st.series.candle)try{st.series.candle.setData(st.candles);}catch(e){}
        if(cb)cb();
      }else{
        console.error(tf+' no candles from server');
        if(cb)cb();
      }
    })
    .catch(function(e){console.error(tf+' fetch error:',e);if(cb)cb();});
}

// === LOCAL STORAGE CACHE ===
function _mktSaveCache(tf){
  var st=window._mkt[tf];if(!st.candles||st.candles.length<1)return;
  try{localStorage.setItem('mkt_cache_'+tf,JSON.stringify(st.candles.slice(-200)));}catch(e){}
}
function _mktLoadCache(tf){
  try{var d=localStorage.getItem('mkt_cache_'+tf);if(d)return JSON.parse(d);}catch(e){}
  return[];
}

// === WS AUTO-RECONNECT 1s ===
function _mktStartWS(tf,pair,channel){
  var st=window._mkt[tf];
  try{
    if(st.ws){try{st.ws.close();}catch(e){}}
    st.ws=new WebSocket('wss://ws.bitget.com/spot/v1/stream');

    st.ws.onopen=function(){
      st.wsOk=true;st.wsRetry=0;_mktWsBadge(tf,true);
      st.ws.send(JSON.stringify({op:'subscribe',args:[{instId:pair,channel:channel}]}));
    };

    st.ws.onmessage=function(evt){
      try{
        var msg=JSON.parse(evt.data);
        if(msg.event==='subscribe'||msg.event==='error')return;
        if(!msg.arg||!msg.data||!msg.data[0])return;
        var d=msg.data[0];
        var candle={time:parseInt(d[0])/1000,open:parseFloat(d[1]),high:parseFloat(d[2]),low:parseFloat(d[3]),close:parseFloat(d[4]),vol:parseFloat(d[5])};
        var last=st.candles.length>0?st.candles[st.candles.length-1]:null;
        if(last&&last.time===candle.time){last.open=candle.open;last.high=candle.high;last.low=candle.low;last.close=candle.close;last.vol=candle.vol;}
        else if(!last||candle.time>last.time){st.candles.push(candle);}
        if(st.series.candle)try{st.series.candle.update(candle);}catch(e){}
        _mktUpdateLive(tf);
        // Save cache every 10 candles
        if(st.candles.length%10===0)_mktSaveCache(tf);
      }catch(e){}
    };

    st.ws.onerror=function(){_mktWsBadge(tf,false);};

    st.ws.onclose=function(){
      st.wsOk=false;_mktWsBadge(tf,false);
      if(st.recTimer)clearTimeout(st.recTimer);
      st.recTimer=setTimeout(function(){
        st.wsRetry++;
        if(st.wsRetry<=200){_mktStartWS(tf,pair,channel);}
        else{console.error(tf+' max retries');}
      },1000);
    };
  }catch(e){
    _mktWsBadge(tf,false);
    if(st.recTimer)clearTimeout(st.recTimer);
    st.recTimer=setTimeout(function(){_mktStartWS(tf,pair,channel);},1000);
  }
}

function _mktWsBadge(tf,on){
  var el=document.getElementById('mktWs'+tf);if(!el)return;
  if(on){el.style.background='rgba(0,212,170,0.2)';el.style.color='var(--a)';el.textContent=tf+': connected';}
  else{el.style.background='#330000';el.style.color='#ff4444';el.textContent=tf+': reconnecting...';}
}

// === CLEANUP ===
function _mktCleanupTF(tf){
  var st=window._mkt[tf];
  if(st.ws){try{st.ws.close();}catch(e){}st.ws=null;}
  if(st.recTimer){clearTimeout(st.recTimer);st.recTimer=null;}
  if(st.chart){try{st.chart.remove();}catch(e){}st.chart=null;}
  if(st.osc){try{st.osc.remove();}catch(e){}st.osc=null;}
  st.series={};st.oscSer={};st.wsOk=false;st.wsRetry=0;
}

function _mktApplyOverlays(tf,ciTf){
  var st=window._mkt[tf];if(!st.chart||!st.candles||st.candles.length<5)return;
  var data=st.candles;
  ['ema','sma','bbU','bbM','bbL','sar','vol','vwap','donU','donL','kelU','kelL','trR','trS','pvP','pvR1','pvS1'].forEach(function(k){
    if(st.series[k]){try{st.chart.removeSeries(st.series[k]);}catch(e){}delete st.series[k];}
  });
  var isOn=function(o){return o&&o.enabled!==false;};
  var tc=_tfColors[tf];

  if(isOn(ciTf.ema)){var p=ciTf.ema.period||20;var s=st.chart.addLineSeries({color:'#ff9f43',lineWidth:1.5,title:'EMA('+p+')',priceLineVisible:false,lastValueVisible:false});s.setData(mktCalcEMA(data,p));st.series.ema=s;}

  if(isOn(ciTf.bb)){var p=ciTf.bb.period||20,sd=ciTf.bb.std||2;var bb=mktCalcBB(data,p,sd);st.series.bbU=st.chart.addLineSeries({color:'rgba(120,120,120,0.5)',lineWidth:1,title:'BB',priceLineVisible:false,lastValueVisible:false});st.series.bbU.setData(bb.map(function(b){return{time:b.time,value:b.upper};}));st.series.bbM=st.chart.addLineSeries({color:'rgba(120,120,120,0.3)',lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false});st.series.bbM.setData(bb.map(function(b){return{time:b.time,value:b.middle};}));st.series.bbL=st.chart.addLineSeries({color:'rgba(120,120,120,0.5)',lineWidth:1,priceLineVisible:false,lastValueVisible:false});st.series.bbL.setData(bb.map(function(b){return{time:b.time,value:b.lower};}));}

  if(st.series.ema&&isOn(ci.ema)){var p=ci.ema.period||20;var e=mktCalcEMA(data,p);if(e.length)try{st.series.ema.update(e[e.length-1]);}catch(x){}}
  if(st.series.sma&&isOn(ci.sma)){var p=ci.sma.period||20;var e=mktCalcSMA(data,p);if(e.length)try{st.series.sma.update(e[e.length-1]);}catch(x){}}
  if(st.series.bbU&&isOn(ci.bb)){var p=ci.bb.period||20,sd=ci.bb.std||2;var bb=mktCalcBB(data,p,sd);if(bb.length){var l=bb[bb.length-1];try{st.series.bbU.update({time:l.time,value:l.upper});}catch(x){}try{st.series.bbM.update({time:l.time,value:l.middle});}catch(x){}try{st.series.bbL.update({time:l.time,value:l.lower});}catch(x){}}}
  if(st.series.sar){var s=mktCalcSAR(data);if(s.length)try{st.series.sar.update(s[s.length-1]);}catch(x){}}
  if(st.series.vwap){var v=mktCalcVWAP(data);if(v.length)try{st.series.vwap.update(v[v.length-1]);}catch(x){}}
  if(st.series.vol){var l=data[data.length-1];try{st.series.vol.update({time:l.time,value:l.vol,color:l.close>=l.open?'rgba(38,166,154,0.4)':'rgba(239,83,80,0.4)'});}catch(x){}}

  // Osc live
  if(data.length<30)return;
  if(st.oscSer.rsi&&isOn(ci.rsi)){var p=ci.rsi.period||14;var r=mktCalcRSI(data,p);if(r.length)try{st.oscSer.rsi.update(r[r.length-1]);}catch(x){}}
  if(st.oscSer.macdL&&isOn(ci.macd)){var fast=ci.macd.fast||12,slow=ci.macd.slow||26,sig=ci.macd.signal||9;var m=mktCalcMACD(data,fast,slow,sig);if(m.length){var l=m[m.length-1];try{st.oscSer.macdL.update({time:l.time,value:l.macd});}catch(x){}try{st.oscSer.macdS.update({time:l.time,value:l.signal});}catch(x){}try{st.oscSer.macdH.update({time:l.time,value:l.histogram,color:l.histogram>=0?'rgba(38,166,154,0.6)':'rgba(239,83,80,0.6)'});}catch(x){}}}
}

// === SIGNAL EVALUATION ===
function _mktEvalSignal(tf,ciTf){
  var st=window._mkt[tf];var data=st.candles;if(!data||data.length<5)return;
  var el=document.getElementById('mkt'+tf+'Analysis');if(!el)return;
  var isOn=function(o){return o&&o.enabled!==false;};
  var last=data[data.length-1];var prev=data.length>1?data[data.length-2]:last;
  var buySigs=[];var sellSigs=[];var details=[];
  var names={ema:'EMA',sma:'SMA',bb:'BB',rsi:'RSI',macd:'MACD',stoch:'STOCH',vwap:'VWAP',sar:'SAR',cmf:'CMF',vol:'VOL',trend:'TREND',pivot:'PIVOT',donchian:'DON',keltner:'KELT',elder:'ELDER',dmi:'DMI',pa:'PA'};

  Object.keys(names).forEach(function(k){
    var ciK=ciTf[k];if(!ciK||!isOn(ciK))return;
    var cur=null,prv=null;
    if(k==='ema'){var e=mktCalcEMA(data,ciK.period||20);if(e.length>1){cur=e[e.length-1].value;prv=e[e.length-2].value;}}
    else if(k==='sma'){var e=mktCalcSMA(data,ciK.period||20);if(e.length>1){cur=e[e.length-1].value;prv=e[e.length-2].value;}}
    else if(k==='bb'){var bb=mktCalcBB(data,ciK.period||20,ciK.std||2);if(bb.length)cur=bb[bb.length-1];}
    else if(k==='rsi'){var r=mktCalcRSI(data,ciK.period||14);if(r.length>1){cur=r[r.length-1].value;prv=r[r.length-2].value;}}
    else if(k==='macd'){var m=mktCalcMACD(data,ciK.fast||12,ciK.slow||26,ciK.signal||9);if(m.length>1){cur=m[m.length-1];prv=m[m.length-2];}}
    else if(k==='stoch'){var s=mktCalcStoch(data,ciK.k_period||14,ciK.d_period||3);if(s.length>1){cur=s[s.length-1];prv=s[s.length-2];}}
    else if(k==='vwap'){var v=mktCalcVWAP(data);if(v.length)cur=v[v.length-1].value;}
    else if(k==='sar'){var s=mktCalcSAR(data);if(s.length)cur=s[s.length-1].value;}
    else if(k==='cmf'){var c=mktCalcCMF(data,ciK.period||20);if(c.length>1){cur=c[c.length-1].value;prv=c[c.length-2].value;}}
    else if(k==='vol'){var avg=0;for(var i=Math.max(0,data.length-20);i<data.length;i++)avg+=data[i].vol;avg/=Math.min(20,data.length);cur={c:last.vol,a:avg};}
    else if(k==='trend'){var tl=mktCalcTrendlines(data,ciK.lookback||50);if(tl.length)cur=tl[tl.length-1];}
    else if(k==='pivot'){var pv=mktCalcPivot(data);if(pv.length)cur=pv[pv.length-1];}
    else if(k==='donchian'){var dc=mktCalcDonchian(data,ciK.period||20);if(dc.length)cur=dc[dc.length-1];}
    else if(k==='keltner'){var kl=mktCalcKeltner(data,ciK.period||20,ciK.multiplier||2);if(kl.length)cur=kl[kl.length-1];}
    else if(k==='elder'){var er=mktCalcElderRay(data,ciK.period||13);if(er.length)cur=er[er.length-1];}
    else if(k==='dmi'){var dm=mktCalcDMI(data,ciK.period||14);if(dm.length)cur=dm[dm.length-1];}
    else if(k==='pa'){var pats=mktDetectPatterns(data.slice(-(ciK.lookback||5)-2));cur=pats.length?pats[pats.length-1].pattern:'';}

    if(cur===null)return;

    // Buy check
    if(ciK.buy_enabled){
      var r=ciK.buy_rule||'';var hit=false;
      if(k==='ema'||k==='sma'){if(r==='cross_above'&&prv)hit=prev.close<=prv&&last.close>cur;else if(r==='above')hit=last.close>cur;}
      else if(k==='bb'){if(r==='at_lower')hit=last.low<=cur.l;else if(r==='below_lower')hit=last.close<cur.l;}
      else if(k==='rsi'){var t=ciK.buy_below||30;if(r==='cross_below'&&prv)hit=prv>t&&cur<=t;else if(r==='below')hit=cur<=t;}
      else if(k==='macd'){if(r==='hist_pos')hit=cur.histogram>0;else if(r==='crossover'&&prv)hit=prv.macd<=prv.signal&&cur.macd>cur.signal;}
      else if(k==='stoch'){var t=ciK.buy_below||20;if(r==='kd_cross_up')hit=cur.k>cur.d&&prv.k<=prv.d;else if(r==='below')hit=cur.k<=t;}
      else if(k==='vwap'){if(r==='cross_above')hit=prev.close<=cur&&last.close>cur;else if(r==='below')hit=last.close<cur;}
      else if(k==='sar'){if(r==='flip_below')hit=cur<last.close;}
      else if(k==='cmf'){var t=ciK.buy_above||0.1;if(r==='cross_above'&&prv)hit=prv<=t&&cur>t;else if(r==='cross_zero_up'&&prv)hit=prv<=0&&cur>0;}
      else if(k==='vol'){if(r==='above_avg')hit=cur.c>cur.a;else if(r==='spike')hit=cur.c>cur.a*2;}
      else if(k==='trend'&&cur){if(r==='support_bounce')hit=last.close>cur.support&&last.low<=cur.support*1.002;}
      else if(k==='pivot'&&cur){if(r==='above_pivot')hit=last.close>cur.pivot;else if(r==='above_r1')hit=last.close>cur.r1;}
      else if(k==='donchian'&&cur){if(r==='break_upper')hit=last.close>cur.upper;}
      else if(k==='keltner'&&cur){if(r==='bounce_lower')hit=last.close>cur.lower&&last.low<=cur.lower;}
      else if(k==='elder'){if(r==='bulls_pos')hit=cur.bulls>0;}
      else if(k==='dmi'){if(r==='plus_di_above')hit=cur.pdi>cur.mdi;else if(r==='adx_strong')hit=cur.adx>20;}
      else if(k==='pa'){if((r==='hammer'&&cur==='hammer')||(r==='morning_star'&&cur==='morning_star')||(r==='bullish_engulf'&&cur==='bullish_engulf'))hit=true;}
      if(hit)buySigs.push(names[k]);
    }

    // Sell check
    if(ciK.sell_enabled){
      var r=ciK.sell_rule||'';var hit=false;
      if(k==='ema'||k==='sma'){if(r==='cross_below'&&prv)hit=last.close<cur;else if(r==='below')hit=last.close<cur;}
      else if(k==='bb'){if(r==='at_upper')hit=last.high>=cur.u;else if(r==='above_upper')hit=last.close>cur.u;}
      else if(k==='rsi'){var t=ciK.sell_above||70;if(r==='cross_above'&&prv)hit=prv<t&&cur>=t;else if(r==='above')hit=cur>=t;}
      else if(k==='macd'){if(r==='hist_neg')hit=cur.histogram<0;else if(r==='crossunder'&&prv)hit=prv.macd>=prv.signal&&cur.macd<cur.signal;}
      else if(k==='stoch'){var t=ciK.sell_above||80;if(r==='kd_cross_down')hit=cur.k<cur.d&&prv.k>=prv.d;else if(r==='above')hit=cur.k>=t;}
      else if(k==='vwap'){if(r==='cross_below')hit=prev.close>=cur&&last.close<cur;else if(r==='above')hit=last.close>cur;}
      else if(k==='sar'){if(r==='flip_above')hit=cur>last.close;}
      else if(k==='cmf'){var t=ciK.sell_below||-0.1;if(r==='cross_below'&&prv)hit=prv>=t&&cur<t;else if(r==='cross_zero_down'&&prv)hit=prv>=0&&cur<0;}
      else if(k==='vol'){if(r==='below_avg')hit=cur.c<cur.a;else if(r==='drying')hit=cur.c<cur.a*0.5;}
      else if(k==='trend'&&cur){if(r==='resistance_bounce')hit=last.close<cur.resistance&&last.high>=cur.resistance*0.998;}
      else if(k==='pivot'&&cur){if(r==='below_pivot')hit=last.close<cur.pivot;else if(r==='below_s1')hit=last.close<cur.s1;}
      else if(k==='donchian'&&cur){if(r==='break_lower')hit=last.close<cur.lower;}
      else if(k==='keltner'&&cur){if(r==='bounce_upper')hit=last.close<cur.upper&&last.high>=cur.upper;}
      else if(k==='elder'){if(r==='bears_neg')hit=cur.bears<0;}
      else if(k==='dmi'){if(r==='minus_di_above')hit=cur.mdi>cur.pdi;else if(r==='adx_strong')hit=cur.adx>20;}
      else if(k==='pa'){if((r==='shooting_star'&&cur==='shooting_star')||(r==='evening_star'&&cur==='evening_star')||(r==='bearish_engulf'&&cur==='bearish_engulf'))hit=true;}
      if(hit)sellSigs.push(names[k]);
    }
  });

  var minBuy=ciTf.min_buy_confirm||2;var minSell=ciTf.min_sell_confirm||2;
  var sig='NEUTRAL';var sigC='var(--t3)';
  if(buySigs.length>=minBuy){sig='BUY';sigC='var(--a)';}
  else if(sellSigs.length>=minSell){sig='SELL';sigC='var(--r)';}

  var h='<div style="display:flex;gap:16px;align-items:center;flex-wrap:wrap">';
  h+='<span style="font-size:16px;font-weight:bold;color:'+sigC+'">'+sig+'</span>';
  h+='<span style="color:var(--a)">BUY: '+buySigs.join(', ')+' ('+buySigs.length+'/'+minBuy+')</span>';
  h+='<span style="color:var(--r)">SELL: '+sellSigs.join(', ')+' ('+sellSigs.length+'/'+minSell+')</span>';
  h+='</div>';
  el.innerHTML=h;
}
